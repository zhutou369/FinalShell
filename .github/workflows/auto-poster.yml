name: Gemini Auto Content Updater

on:
  schedule:
    - cron: '12 0 * * *'
  workflow_dispatch:
    inputs:
      post_count:
        description: '本次生成的文章数量（1-9，默认 1）'
        required: true
        default: '1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: 'Asia/Shanghai'

permissions:
  contents: write

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Run Gemini Content Generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node autobot.js ${{ github.event.inputs.post_count || '1' }}

    - name: Post-process posts
      run: npm run postprocess

    - name: Build Eleventy Site
      run: npm run build

    - name: Commit and Push Changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Gemini-Content-Bot"
        git config --global user.email "bot@finalshell-cn.com"
        git add posts/ keywords.json
        if ! git diff --cached --quiet; then
          git commit -m "🤖 [Bot] 自动更新文章并同步词库"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
        else
          echo "无新变化，跳过推送"
        fi

    - name: Bing IndexNow Push
      env:
        INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        BING_DOMAIN: finalshell-cn.com
      run: node tools/bing-instant-push.js
