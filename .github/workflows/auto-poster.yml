name: Gemini Auto Content Updater

on:
  schedule:
    # 每天北京时间上午 09:30 准时自动触发更新 (9:30 AM HKT = 1:30 AM UTC)
    - cron: '30 1 * * *'
  workflow_dispatch: # 允许你在 GitHub Web 界面上手动点击按钮随时触发测试

jobs:
  build-and-post:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出 11ty 项目的全部源码
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 部署 Node.js 20 生产环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. 安装谷歌最新官方 AI SDK
    - name: Install @google/genai
      run: npm install @google/genai

    # 4. 运行刚才编写的 Node 脚本，安全注入密钥
    - name: Run Gemini Content Generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node cron-generate.js

    # 5. 将新生成的 Markdown 文章以及被裁剪后的 json 词库文件 push 回 GitHub 仓库
    - name: Commit and Push Changes back to Repo
      run: |
        git config --global user.name "Gemini-Content-Bot"
        git config --global user.email "bot@yourdomain.com"
        git add .
        # 检查是否有代码改变，避免因没有文件更新导致报错
        git diff-index --quiet HEAD || git commit -m "🤖 [Bot] 自动同步今日定时SEO文章并更新词库"
        git push